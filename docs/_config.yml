# Jekyll site (GitHub Pages) — same stack as open-fdd: Just the Docs remote theme
title: "Easy ASO"
description: "Asyncio-first BACnet supervisory layer and IoT-edge agents — lightweight BAS orchestration with an optional platform-style supervisor."
baseurl: "/easy-aso"
url: "https://bbartling.github.io"

remote_theme: just-the-docs/just-the-docs
color_scheme: "light"

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-seo-tag

aux_links:
  "GitHub": "https://github.com/bbartling/easy-aso"
  "diy-bacnet-server": "https://github.com/bbartling/diy-bacnet-server"

footer_content: "MIT · easy-aso · BACnet edge + asyncio supervisor"

heading_anchors: true

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: true
