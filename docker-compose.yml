services:
  # Singleton that owns BACnet/IP UDP/47808 on the host.
  # This is vendored in this repo under vendor/diy-bacnet-server.
  bacnet-core:
    build:
      context: ./vendor/diy-bacnet-server
    network_mode: host
    environment:
      # IMPORTANT: Tune these to your site.
      # Example (Pi on LAN):
      #   BACNET_CORE_ARGS: "--name Core --instance 123456 --address 10.200.200.10/24"
      BACNET_CORE_ARGS: ${BACNET_CORE_ARGS:-"--name Core --instance 123456"}
    command: ["sh", "-c", "python3 -u bacpypes_server/main.py  --public"]
    # NOTE: bacpypes_server/main.py uses bacpypes3 SimpleArgumentParser,
    # so args must be passed via command. We keep BACNET_CORE_ARGS for your docs,
    # but you can edit the command line directly if desired.
    restart: unless-stopped

  # Two test-bench duelers that prove RPM + read + write + null-release.
  dueler_a:
    build: .
    network_mode: host
    depends_on:
      - bacnet-core
    environment:
      BACNET_BACKEND: "diy_jsonrpc"
      DIY_BACNET_URL: ${DIY_BACNET_URL:-"http://127.0.0.1:8080"}
      DIY_BACNET_ENTRYPOINT: ${DIY_BACNET_ENTRYPOINT:-"/api"}
      AGENT_NAME: "dueler_a"
      DEVICE_INSTANCE: ${DEVICE_INSTANCE:-"3456789"}
      BOOL_POINT: ${BOOL_POINT:-"binaryValue,1"}
      WRITE_PRIORITY: ${WRITE_PRIORITY:-"8"}
      HOLD_SECONDS: ${HOLD_SECONDS:-"2"}
      STEP_SECONDS: ${DUELER_STEP_SECONDS:-"5"}
      JITTER_SECONDS: "0.5"
      # Example RPM args (space-separated, pairs):
      # RPM_ARGS: "analogValue,1 present-value analogValue,1 units"
      RPM_ARGS: ${RPM_ARGS:-""}
    command: ["python", "-m", "easy_aso.agents.dueler_agent"]
    restart: unless-stopped

  dueler_b:
    build: .
    network_mode: host
    depends_on:
      - bacnet-core
    environment:
      BACNET_BACKEND: "diy_jsonrpc"
      DIY_BACNET_URL: ${DIY_BACNET_URL:-"http://127.0.0.1:8080"}
      DIY_BACNET_ENTRYPOINT: ${DIY_BACNET_ENTRYPOINT:-"/api"}
      AGENT_NAME: "dueler_b"
      DEVICE_INSTANCE: ${DEVICE_INSTANCE:-"3456789"}
      BOOL_POINT: ${BOOL_POINT:-"binaryValue,1"}
      WRITE_PRIORITY: ${WRITE_PRIORITY:-"8"}
      HOLD_SECONDS: ${HOLD_SECONDS:-"2"}
      STEP_SECONDS: ${DUELER_STEP_SECONDS:-"5"}
      JITTER_SECONDS: "1.0"
      RPM_ARGS: ${RPM_ARGS:-""}
    command: ["python", "-m", "easy_aso.agents.dueler_agent"]
    restart: unless-stopped

  # MQTT broker (host network so agents can reach it at 127.0.0.1:1883)
  mqtt:
    image: eclipse-mosquitto:2
    network_mode: host
    restart: unless-stopped

  mqtt_publisher:
    build: .
    network_mode: host
    depends_on:
      - bacnet-core
      - mqtt
    environment:
      BACNET_BACKEND: "diy_jsonrpc"
      DIY_BACNET_URL: ${DIY_BACNET_URL:-"http://127.0.0.1:8080"}
      DIY_BACNET_ENTRYPOINT: ${DIY_BACNET_ENTRYPOINT:-"/api"}
      AGENT_NAME: "mqtt_publisher"
      MQTT_HOST: "127.0.0.1"
      MQTT_PORT: "1883"
      MQTT_TOPIC: ${MQTT_TOPIC:-"easyaso/telemetry"}
      DEVICE_INSTANCE: ${DEVICE_INSTANCE:-"3456789"}
      RPM_ARGS: ${RPM_ARGS:-""}
      STEP_SECONDS: ${MQTT_STEP_SECONDS:-"5"}
    command: ["python", "-m", "easy_aso.agents.mqtt_publisher_agent"]
    restart: unless-stopped

  hvac_agent:
    build: .
    network_mode: host
    depends_on:
      - bacnet-core
    environment:
      BACNET_BACKEND: "diy_jsonrpc"
      DIY_BACNET_URL: ${DIY_BACNET_URL:-"http://127.0.0.1:8080"}
      DIY_BACNET_ENTRYPOINT: ${DIY_BACNET_ENTRYPOINT:-"/api"}
      AGENT_NAME: "hvac_agent"
      DEVICE_INSTANCE: ${DEVICE_INSTANCE:-"3456789"}
      RPM_ARGS: ${RPM_ARGS:-""}
      STEP_SECONDS: ${HVAC_STEP_SECONDS:-"10"}
    command: ["python", "-m", "easy_aso.agents.hvac_agent"]
    restart: unless-stopped
