name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (dev extras)
        run: pip install -e ".[dev]"

      - name: Build combined docs text (sanity; same script as PDF workflow)
        run: |
          pip install pyyaml
          python scripts/build_docs_pdf.py --no-pdf

      - name: Run unit + supervisor tests
        run: pytest tests/test_abc.py tests/test_supervisor.py -v --tb=short

      - name: Dry-run sdist/wheel
        run: |
          pip install build==1.2.2 twine==6.1.0
          python -m build
          twine check dist/*
