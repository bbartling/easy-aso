# Publish the **easy-aso** package (repo root pyproject.toml) to PyPI on version tags.
# Same idea as open-fdd engine publish: https://github.com/bbartling/open-fdd/blob/master/.github/workflows/publish-openfdd-engine.yml
#
# Before first upload: configure **Trusted Publishing** on PyPI for this workflow.

name: Publish easy-aso to PyPI

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build==1.2.2 twine==6.1.0
          python -m build
          twine check dist/*

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
