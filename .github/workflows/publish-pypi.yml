# PyPI project **easy-aso** (repo root `pyproject.toml`).
# Publishes on push tag **v*** after tests pass on Python 3.11 and 3.12.
# Configure Trusted Publishing on PyPI for this workflow file before first upload.

name: Publish easy-aso to PyPI

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (dev extras)
        run: pip install -e ".[dev]"

      - name: Build combined docs text (sanity)
        run: |
          pip install pyyaml
          python scripts/build_docs_pdf.py --no-pdf

      - name: Run unit + supervisor + runtime tests
        run: pytest tests/test_abc.py tests/test_supervisor.py tests/test_runtime_rpc_docked.py -v --tb=short

      - name: Dry-run sdist/wheel
        run: |
          pip install build==1.2.2 twine==6.1.0
          python -m build
          twine check dist/*

  build-and-publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build==1.2.2 twine==6.1.0

      - name: Build package
        run: |
          python -m build
          twine check dist/*

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
